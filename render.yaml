services:
  - type: web
    name: flixmate-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build:backend
    startCommand: npx prisma db push --accept-data-loss && npx prisma db seed && npm run start:backend
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: flixmate-db
          property: connectionString
      - key: APP_URL
        sync: false # Set to your Vercel frontend URL
        value: https://your-app.vercel.app
      - key: GEMINI_API_KEY
        sync: false # Optional: Set your Gemini API key if required

databases:
  - name: flixmate-db
    plan: free
    databaseName: flixmate
    user: flixmate_user
